<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>trivela // free-kick lab</title>
  <meta name="description" content="Bend a free kick around the wall into the top corner — a tiny game that teaches the Magnus effect. Open source, no deps." />
  <meta name="theme-color" content="#0a0708" />
  <meta property="og:title" content="trivela // free-kick lab" />
  <meta property="og:description" content="Curl it round the wall into the top bins — and learn the Magnus effect by feel." />
  <meta property="og:type" content="website" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0708'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23e0102f' stroke-width='2'/%3E%3Cpath d='M16 7 a9 9 0 0 1 7 14' fill='none' stroke='%23ff2f47' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="app">
    <header class="bar">
      <span class="bar__brand">trivela <span class="dim">// free-kick lab</span></span>
      <div class="bar__right">
        <button class="bar__btn" id="theme" type="button" title="theme (t)">◐ <span id="themeName">blood</span></button>
        <a class="bar__btn" href="https://chitransh.pulsar-projects.org" target="_blank" rel="noopener">by chitransh ↗</a>
        <a class="bar__btn" href="https://github.com/Chitransh-Saxena/trivela" target="_blank" rel="noopener">source ↗</a>
      </div>
    </header>

    <main class="stage">
      <trivela-game></trivela-game>
    </main>

    <footer class="foot">
      <span class="dim">move = aim · ◀/▶ curl · hold SPACE for power · release to strike · <b>?</b> for the physics</span>
    </footer>
  </div>

  <script src="/physics.js" defer></script>
  <script src="/trivela-game.js" defer></script>
  <script>
    (function () {
      var root = document.documentElement, name = document.getElementById("themeName");
      try { if (localStorage.getItem("trivela_theme") === "amber") { root.setAttribute("data-theme", "amber"); name.textContent = "amber"; } } catch (e) {}
      function toggle() {
        var amber = root.getAttribute("data-theme") === "amber";
        if (amber) { root.removeAttribute("data-theme"); name.textContent = "blood"; } else { root.setAttribute("data-theme", "amber"); name.textContent = "amber"; }
        try { localStorage.setItem("trivela_theme", amber ? "blood" : "amber"); } catch (e) {}
      }
      document.getElementById("theme").addEventListener("click", toggle);
      document.addEventListener("keydown", function (e) {
        var t = (document.activeElement && document.activeElement.tagName || "").toLowerCase();
        if ((e.key === "t" || e.key === "T") && t !== "trivela-game") toggle();
      });
    })();
  </script>
</body>
</html>
